version: "3.9"

services:
  # ────────────────────────────── Infrastructure ──────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lantara}
      POSTGRES_USER: ${POSTGRES_USER:-lantara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lantara}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lantara} -d ${POSTGRES_DB:-lantara}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lantara

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - lantara

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lantara

  # ─────────────────────────────── Backend ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgres://${POSTGRES_USER:-lantara}:${POSTGRES_PASSWORD:-lantara}@db:5432/${POSTGRES_DB:-lantara}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
    volumes:
      - ./backend:/app
      - ./fixtures:/fixtures:ro
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - lantara
    expose:
      - "8000"

  # ──────────────────────────── Celery worker ─────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A config.celery worker -l info -c 4
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgres://${POSTGRES_USER:-lantara}:${POSTGRES_PASSWORD:-lantara}@db:5432/${POSTGRES_DB:-lantara}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
    volumes:
      - ./backend:/app
      - ./fixtures:/fixtures:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lantara

  # ────────────────────────── Celery Beat (SLA sweeps) ────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A config.celery beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgres://${POSTGRES_USER:-lantara}:${POSTGRES_PASSWORD:-lantara}@db:5432/${POSTGRES_DB:-lantara}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lantara

  # ─────────────────────────────── Frontend ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - frontend_dist:/usr/share/nginx/html
    networks:
      - lantara

  # ────────────────────────────── Nginx (edge) ────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - static_data:/usr/share/nginx/html/static:ro
    depends_on:
      - backend
      - frontend
    networks:
      - lantara

networks:
  lantara:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  static_data:
  frontend_dist:
