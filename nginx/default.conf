upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

# ── Security headers applied to all responses ──────────────────────────────
map $sent_http_content_type $csp_header {
    default "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' wss: https://tiles.openfreemap.org; frame-ancestors 'none';";
}

server {
    listen 80;
    server_name _;
    client_max_body_size 50M;

    # Global security headers
    add_header X-Content-Type-Options    "nosniff"                          always;
    add_header X-Frame-Options           "DENY"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(self), payment=()" always;
    add_header X-XSS-Protection          "1; mode=block"                    always;
    add_header Content-Security-Policy   $csp_header                        always;

    # Remove server version header
    server_tokens off;

    # Backend API
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        # No caching for API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # WebSocket for Django Channels
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Django admin — restricted, no cache
    location /django-admin/ {
        proxy_pass http://backend/admin/;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store" always;
    }

    # Media files — denied (served via signed MinIO URLs)
    location /media/ {
        return 403;
    }

    # Static assets — aggressive caching, immutable for hashed files
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # HTML — no cache (SPA entry point must always be fresh)
    location ~* \.html$ {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Frontend SPA catch-all
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_intercept_errors off;
        # index.html must never be cached by CDN/proxy
        add_header Cache-Control "no-cache" always;
    }

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml font/woff2;
}
